<!DOCTYPE html>

<script>  
  const navButton = document.querySelector('.menu-button');  
  const navMenu = document.querySelector('#primary-menu');  
  const setMenu = (open) => {    
    navMenu.classList.toggle('is-open', open);    
    navButton.setAttribute('aria-expanded', String(open));    
    navButton.setAttribute('aria-label', open ? 'Close menu' : 'Open menu');  
  };  
  navButton.addEventListener('click', () => setMenu(!navMenu.classList.contains('is-open')));  
  navMenu.addEventListener('click', (event) => {    
    if (event.target.matches('a')) setMenu(false);  
  });  
  document.addEventListener('keydown', (event) => {    
    if (event.key === 'Escape') setMenu(false);  
  });

  const seeMoreButton = document.querySelector('.see-more-btn');  
  const extraGames = document.querySelector('#extra-games');  
  if (seeMoreButton && extraGames) {    
    seeMoreButton.addEventListener('click', () => {      
      const expanded = seeMoreButton.getAttribute('aria-expanded') === 'true';      
      if (!expanded) {        
        extraGames.hidden = false;        
        extraGames.offsetHeight;         
        extraGames.classList.add('is-visible');      
      } else {        
        extraGames.classList.remove('is-visible');        
        setTimeout(() => { if(seeMoreButton.getAttribute('aria-expanded') === 'false') extraGames.hidden = true; }, 250);      
      }      
      seeMoreButton.setAttribute('aria-expanded', String(!expanded));      
      seeMoreButton.textContent = expanded ? 'See More' : 'Show Less';    
    });  
  }

  // Live Roblox API Sync Data Bridge
  async function syncRobloxStats() {
    try {
      // Forcing absolute route to bypass relative path environment locks
      const response = await fetch('https://roblox-portfolio-alpha-one.vercel.app/api/roblox-stats');
      const data = await response.json();
      
      if (!data || !data.games) return;

      const formatCount = (num) => {
        if (num >= 1e6) return (num / 1e6).toFixed(1) + 'M+';
        if (num >= 1e3) return (num / 1e3).toFixed(1) + 'K+';
        return num;
      };

      const archer = data.games.find(g => g.id === 9807623580);
      const tower = data.games.find(g => g.id === 9375088027);

      // 1. Update the 3 Live Hero Slots
      const totalVisits = (archer ? archer.visits : 0) + (tower ? tower.visits : 0);
      const totalPlaying = (archer ? archer.playing : 0) + (tower ? tower.playing : 0);

      const heroMembers = document.getElementById('hero-members');
      const heroVisits = document.getElementById('hero-visits');
      const heroPlaying = document.getElementById('hero-playing');

      if (heroMembers) heroMembers.textContent = formatCount(data.groupMembers);
      if (heroVisits) heroVisits.textContent = formatCount(totalVisits);
      if (heroPlaying) heroPlaying.textContent = totalPlaying.toLocaleString();

      // 2. Map Archer Training Card
      if (archer) {
        const archerVisitsElement = document.getElementById('archer-visits');
        const archerPlayingElement = document.getElementById('archer-playing');
        if (archerVisitsElement) archerVisitsElement.textContent = formatCount(archer.visits) + ' Visits';
        if (archerPlayingElement) archerPlayingElement.textContent = archer.playing.toLocaleString();
      }

      // 3. Map Tower Builders Card
      if (tower) {
        const towerVisitsElement = document.getElementById('tower-visits');
        const towerPlayingElement = document.getElementById('tower-playing');
        if (towerVisitsElement) towerVisitsElement.textContent = formatCount(tower.visits) + ' Visits';
        if (towerPlayingElement) towerPlayingElement.textContent = tower.playing.toLocaleString();
      }

      // 4. Map Featured Group Pill
      const groupPill = document.getElementById('group-pill-members');
      if (groupPill) groupPill.textContent = formatCount(data.groupMembers) + ' Members';

    } catch (error) {
      console.error("Failed to sync live metrics:", error);
    }
  }

  document.addEventListener('DOMContentLoaded', syncRobloxStats);
</script>
